name: Build calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    paths:
      - "calendar.ics"
      - ".github/workflows/calendar.yml"
      - "tools/**"

permissions:
  contents: write

jobs:
  normalize-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync PlayMetrics calendar
        run: python tools/sync_playmetrics.py

      - name: Normalize calendar
        run: python tools/normalize_ics.py

      - name: Commit calendar changes if needed
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add calendar.ics
            git commit -m "Sync calendar.ics"
            git push
          fi
